<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="login_page_title">BookLuxor Login</title>
                               <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
</head>

<body>
    <section class="login-section">
        <!-- Left Image Section -->
        <div class="left-section">
            <img src="/assets/images/form/login-img.jpg" alt="hero">
            <div class="text-overlay text-white text-center">
                <h1 class="fw-bold" data-translate="left_title">Access Your Luxor Getaways</h1>
                <p class="mb-5 pb-5 fs-4" data-translate="left_subtitle">
                    Sign in to unlock exclusive stays and unforgettable experiences.
                </p>
            </div>
        </div>
        <!-- Right Form Section -->
        <div class="right-section">
            <div class="form-wrapper">
                <div class="d-flex justify-content-between align-items-center">
                    <h3 class="fw-bold text-primary mb-2">Login As User</h3>
                    <div class="d-flex align-items-center mb-2">
                        <img src="/assets/images/form/english.png" alt="EN" width="20" height="20" />
                        <div class="dropdown">
                            <button class="btn p-1 btn-sm border-0 fw-semibold text-dark dropdown-toggle no-caret"
                                type="button" data-bs-toggle="dropdown">
                                EN
                            </button>
                            <ul class="dropdown-menu">
                                <li>
                                    <a class="dropdown-item d-flex align-items-center" href="#">
                                        <img src="/assets/images/form/english.png" alt="EN" width="18" height="18"
                                            class="me-2" />
                                        EN
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item d-flex align-items-center" href="#">
                                        <img src="/assets/images/form/ar.png" alt="AR" width="18" height="18"
                                            class="me-2" />
                                        AR
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <p class="text-muted py-3">
                    Want to list your property?
                    <a href="/befor-login/login-flow/login-host.html"
                        class="fw-semibold text-primary text-decoration-none">
                        Login as Host
                    </a>
                </p>
                <form>
                    <!-- Email -->
                    <div class="mb-3 position-relative">
                        <input type="email" class="form-control py-2 ps-5 pe-5" data-translate="email_placeholder"
                            placeholder="Email address" required>
                        <i
                            class="fa-regular fa-envelope position-absolute top-50 start-0 translate-middle-y ps-3 text-secondary"></i>
                    </div>
                    <!-- Password -->
                    <div class="mb-3 position-relative">
                        <input type="password" class="form-control py-2 ps-5 pe-5 password-field"
                            data-translate="password_placeholder" placeholder="Password" required>
                        <i
                            class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ps-3 text-secondary"></i>
                        <i
                            class="fa-solid fa-eye-slash position-absolute top-50 end-0 translate-middle-y pe-3 text-secondary toggle-password"></i>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <!-- Remember me -->
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label text-muted" for="rememberMe">
                                Remember me
                            </label>
                        </div>

                        <!-- Forgot password -->
                        <a href="forgotpw.html" class="text-decoration-none text-primary fw-medium"
                            data-translate="forgot_password">
                            Forgot password?
                        </a>

                    </div>

                    <a href="/after-login/landing.html" type="submit" class="btn btn-primary w-100 py-2 rounded-pill"
                        data-translate="login_button">Login</a>
                </form>
                <div class="divider" data-translate="or_text">Or</div>
                <div class="d-flex flex-column flex-lg-row justify-content-between mb-3 gap-2">

                    <button
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 flex-fill rounded-5">
                        <svg width="20" height="20" viewBox="0 0 533.5 544.3">
                            <path fill="#4285F4"
                                d="M533.5 278.4c0-17.6-1.6-35-4.9-51.9H272v98.3h146.9c-6.3 34-25.2 62.8-53.7 82v68.2h86.8c50.7-46.7 80.5-115.6 80.5-196.6z" />
                            <path fill="#34A853"
                                d="M272 544.3c72.6 0 133.6-24.1 178-65.4l-86.8-68.2c-24.1 16.2-54.7 25.7-91.2 25.7-69.9 0-129.2-47.2-150.4-110.5H34.9v69.3c44.1 88 134.7 149.1 237.1 149.1z" />
                            <path fill="#FBBC05"
                                d="M121.6 330.9c-9.7-28.9-9.7-60.6 0-89.5v-69.3H34.9C12.4 214.2 0 242.6 0 272s12.4 57.8 34.9 85.9l86.7-69z" />
                            <path fill="#EA4335"
                                d="M272 107.3c37.8 0 71.6 13 98.3 34.7l73.6-73.6C405.6 24.1 344.6 0 272 0 169.6 0 79 61.1 34.9 149.1l86.7 69c21.2-63.3 80.5-110.5 150.4-110.5z" />
                        </svg>
                        <span>Google</span>
                    </button>

                    <button
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 flex-fill rounded-5">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
                            width="18" />
                        <span>Apple</span>
                    </button>

                    <button
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 flex-fill rounded-5">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png"
                            width="18" />
                        <span>Facebook</span>
                    </button>

                </div>

                <p class="text-muted text-center">
                    <span data-translate="no_account">Don’t have an account?</span>
                    <a href="Signup.html" class="text-decoration-none text-primary fw-bold" data-translate="signup">
                        Sign up
                    </a>
                </p>
            </div>
        </div>
    </section>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/form.js"></script>
    <script src="/assets/js/lang.js"></script>
</body>

</html>

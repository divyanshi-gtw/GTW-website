<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="signup_page_title">BookLuxor Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/hero/favicon.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/css/intlTelInput.css">

</head>

<body>

    <section class=" d-flex ">

        <!-- Left Image Section -->
        <div class="left-section">
            <img src="/assets/images/form/signup.png" alt="hero">
            <div class="text-overlay text-white text-center">
                <h1 class="fw-bold" data-translate="left_title">Access Your Luxor Getaways</h1>
                <p class="mb-5 pb-5 fs-4" data-translate="left_subtitle">
                    Sign in to unlock exclusive stays and unforgettable experiences.
                </p>
            </div>
        </div>

        <!-- RIGHT FORM -->
        <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center">

            <div class="w-100 py-4" style="max-width:520px;">

                <!-- HEADER -->
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h3 class="fw-bold text-primary mb-0">Sign Up</h3>

                    <div class="d-flex align-items-center mb-2">
                        <img src="/assets/images/form/english.png" alt="EN" width="20" height="20" />
                        <div class="dropdown">
                            <button class="btn p-1 btn-sm border-0 fw-semibold text-dark dropdown-toggle no-caret"
                                type="button" data-bs-toggle="dropdown">
                                EN
                            </button>
                            <ul class="dropdown-menu">
                                <li>
                                    <a class="dropdown-item d-flex align-items-center" href="#"> <img
                                            src="/assets/images/form/english.png" alt="EN" width="18" height="18"
                                            class="me-2" />
                                        EN
                                    </a>
                                </li>
                                <li>
                                    <a class="dropdown-item d-flex align-items-center" href="#"> <img
                                            src="/assets/images/form/ar.png" alt="AR" width="18" height="18"
                                            class="me-2" />
                                        AR
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <p class="text-muted">
                    Want to list your property?
                    <a href="/befor-login/login-flow/Signup-host.html"
                        class="fw-semibold text-primary text-decoration-none">
                        Sign up as Host
                    </a>
                </p>

                <!-- FORM -->
                <form class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">First Name</label>
                        <input type="text" class="form-control" placeholder="First name">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Last Name</label>
                        <input type="text" class="form-control" placeholder="Last name">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control" placeholder="Email address">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="tel" id="phone" class="form-control py-2" placeholder="Phone number">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" class="form-control" placeholder="Confirm password">
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="terms">
                            <label class="form-check-label text-muted" for="terms">
                                I agree to the <a href="#">Terms & Conditions</a>
                            </label>
                        </div>
                    </div>

                    <div class="col-12">
                        <button class="btn btn-primary w-100 rounded-pill py-2">
                            Sign Up
                        </button>
                    </div>

                    <div class="col-12 text-center">
                        <span class="text-muted">
                            Already have an account?
                            <a href="login.html" class="fw-semibold">Login</a>
                        </span>
                    </div>
                </form>

                <div class="divider" data-translate="or_text">Or</div>
                <div class="d-flex flex-column flex-lg-row justify-content-between mb-3 gap-2">

                    <button
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 flex-fill rounded-5">
                        <svg width="20" height="20" viewBox="0 0 533.5 544.3">
                            <path fill="#4285F4"
                                d="M533.5 278.4c0-17.6-1.6-35-4.9-51.9H272v98.3h146.9c-6.3 34-25.2 62.8-53.7 82v68.2h86.8c50.7-46.7 80.5-115.6 80.5-196.6z" />
                            <path fill="#34A853"
                                d="M272 544.3c72.6 0 133.6-24.1 178-65.4l-86.8-68.2c-24.1 16.2-54.7 25.7-91.2 25.7-69.9 0-129.2-47.2-150.4-110.5H34.9v69.3c44.1 88 134.7 149.1 237.1 149.1z" />
                            <path fill="#FBBC05"
                                d="M121.6 330.9c-9.7-28.9-9.7-60.6 0-89.5v-69.3H34.9C12.4 214.2 0 242.6 0 272s12.4 57.8 34.9 85.9l86.7-69z" />
                            <path fill="#EA4335"
                                d="M272 107.3c37.8 0 71.6 13 98.3 34.7l73.6-73.6C405.6 24.1 344.6 0 272 0 169.6 0 79 61.1 34.9 149.1l86.7 69c21.2-63.3 80.5-110.5 150.4-110.5z" />
                        </svg>
                        <span>Google</span>
                    </button>

                    <button
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 flex-fill rounded-5">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
                            width="18" />
                        <span>Apple</span>
                    </button>

                    <button
                        class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2 flex-fill rounded-5">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png"
                            width="18" />
                        <span>Facebook</span>
                    </button>

                </div>

            </div>
        </div>

    </section>

    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/form.js"></script>
    <script src="/assets/js/lang.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/intlTelInput.min.js"></script>

    <script>
        const phoneInput = document.querySelector("#phone");

        window.intlTelInput(phoneInput, {
            initialCountry: "in",         // default country
            separateDialCode: true,       // shows +91 separate
            nationalMode: false,
            autoHideDialCode: false,
            formatOnDisplay: true,
            utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"
        });
    </script>


</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookLuxor otp</title>
                               <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main.css" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
</head>

<body>
    <section class="login-section">
        <!-- Left Image Section -->
        <div class="left-section">
            <img src="/assets/images/form/verify-otp.jpg" alt="hero">
            <div class="text-overlay text-white text-center">
                <h1 class="fw-bold">Authenticate Your Luxor
                    Login</h1>
                <p class="mb-5 pb-5 fs-4" data-translate="left_subtitle">
                    Sign in to unlock exclusive stays and
                    unforgettable experiences. </p>
            </div>
        </div>
        <!-- Right Form Section -->
        <div class="right-section">
            <div class="form-wrapper">
                <h3 class="fw-bold text-primary mb-2 text-center">Verify OTP</h3>
                <p class="text-muted mb-4 text-center">Please enter OTP sent to your email address</p>
                <form class="otp-form">
                    <div class="otp-inputs d-flex justify-content-center gap-4 mb-3">
                        <input type="text" maxlength="1" class="otp-box form-control text-center" required>
                        <input type="text" maxlength="1" class="otp-box form-control text-center" required>
                        <input type="text" maxlength="1" class="otp-box form-control text-center" required>
                        <input type="text" maxlength="1" class="otp-box form-control text-center" required>
                    </div>
                    <div class="text-center mb-4">
                        <a href="#" class="text-decoration-none text-primary fw-semibold">Resend Code</a>
                    </div>
                    <a href="/befor-login/login-flow/changepw.html" type="submit"
                        class="btn btn-primary w-100 py-2 rounded-pill fw-semibold">Verify</a>
                </form>
            </div>
        </div>
    </section>
    <script src="/assets/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/form.js"></script>
</body>

</html>
